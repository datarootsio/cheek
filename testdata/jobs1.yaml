env:
  FOO: baz
jobs:
  foo:
    command: date
    cron: "* * * * *"
    on_success:
      trigger_job:
        - bar
  bar:
    command:
      - /bin/bash
      - -c
      - "echo bar_foo"
  shuttle:
    command:
      - ls
      - .
    cron: "* * * * *"
  coffee:
    command: this fails
    cron: "* * * * *"
    retries: 3
  string_command:
    command: echo foo bar
  command_with_a_very_long_title:
    command: echo foo bar
  global_env_var:
    cron: "* * * * *"
    command: 
      - /bin/bash
      - -c
      - echo global env $FOO
  local_env_var:
    env:
      FOO: local
    command: 
      - /bin/bash
      - -c
      - echo $FOO    